<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="text/markdown" href="https://raw.githubusercontent.com/fayrose/leaflet-docs/main/{{ page.name }}" title="Markdown version">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  {% include header.html %}
  
  <main class="container page-content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <script data-goatcounter="https://leaflet-docs.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
